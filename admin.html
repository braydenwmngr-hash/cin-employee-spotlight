<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin | Cinergy Team Spotlight</title><link rel="stylesheet" href="styles.css"></head><body><div class="bg"></div><header class="topbar"><div class="brand">CINERGY <span>| ADMIN</span></div><nav><a class="pill" href="/">View Board</a><button class="pill" id="logout">Logout</button></nav><div id="clock"></div></header><main class="admin panel"><section id="loginBox"><h1>Admin Login</h1><input id="username" placeholder="Username"><input id="password" type="password" placeholder="Password"><button id="loginBtn">Log In</button><p id="loginMsg"></p></section><section id="editor" hidden><h1>Update Spotlight Board</h1><label>Month<input id="month"></label><label>Employee Name<input id="empName"></label><label>Role / Department<input id="empRole"></label><label>Photo URL<input id="photo" placeholder="Optional image URL"></label><label>Quote<textarea id="quote"></textarea></label><label>Highlights, one per line<textarea id="highlights"></textarea></label><label>MAGICAL Values, one per line<textarea id="values"></textarea></label><label>Bottom Ticker<textarea id="ticker"></textarea></label><h2>Announcements</h2><div id="annEditor"></div><button id="addAnn">+ Add Announcement</button><button id="saveBtn" class="save">Save Updates</button><p id="saveMsg"></p></section></main><script src="admin.js"></script></body></html>
